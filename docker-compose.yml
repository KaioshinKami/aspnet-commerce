services:

  # ── Databases ──────────────────────────────────────────────────────────────

  identity-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: identitydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  vehicle-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vehicledb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - vehicle-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  booking-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookingdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - booking-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Message Broker ─────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Cache ──────────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Microservices ──────────────────────────────────────────────────────────

  identity-service:
    build:
      context: .
      dockerfile: src/IdentityService/IdentityService.API/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=identity-db;Port=5432;Database=identitydb;Username=postgres;Password=postgres"
      Jwt__Key: "SuperSecretKey_CarRental_2024_ChangeMe!"
      Jwt__Issuer: "CarRentalIdentity"
      Jwt__Audience: "CarRentalClients"
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      identity-db:
        condition: service_healthy

  vehicle-service:
    build:
      context: .
      dockerfile: src/VehicleService/VehicleService.API/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=vehicle-db;Port=5432;Database=vehicledb;Username=postgres;Password=postgres"
      ConnectionStrings__Redis: "redis:6379"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "guest"
      RabbitMQ__Password: "guest"
      Jwt__Key: "SuperSecretKey_CarRental_2024_ChangeMe!"
      Jwt__Issuer: "CarRentalIdentity"
      Jwt__Audience: "CarRentalClients"
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      vehicle-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  booking-service:
    build:
      context: .
      dockerfile: src/BookingService/BookingService.API/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=booking-db;Port=5432;Database=bookingdb;Username=postgres;Password=postgres"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "guest"
      RabbitMQ__Password: "guest"
      Jwt__Key: "SuperSecretKey_CarRental_2024_ChangeMe!"
      Jwt__Issuer: "CarRentalIdentity"
      Jwt__Audience: "CarRentalClients"
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      booking-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── API Gateway ────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    ports:
      - "5000:8080"
    environment:
      Jwt__Key: "SuperSecretKey_CarRental_2024_ChangeMe!"
      Jwt__Issuer: "CarRentalIdentity"
      Jwt__Audience: "CarRentalClients"
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      - identity-service
      - vehicle-service
      - booking-service

volumes:
  identity-db-data:
  vehicle-db-data:
  booking-db-data:
